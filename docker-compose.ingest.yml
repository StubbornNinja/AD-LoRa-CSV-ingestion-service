services:
  ingest-api:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./uploads:/opt/chirpstack-ingest/uploads
      - ./data:/opt/chirpstack-ingest/data
    networks:
      - chirpstack

networks:
  chirpstack:
    external: true
